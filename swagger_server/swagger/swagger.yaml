openapi: 3.0.0
info:
  title: Simple Inventory API
  description: This is a simple API
  contact:
    email: you@your-company.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
servers:
- url: https://virtserver.swaggerhub.com/tutorial/1.0.0
  description: SwaggerHub API Auto Mocking
paths:
  /student/{student_id}/average_grade:
    get:
      summary: Gets average grade of student
      description: Returns the average grade of a given student.
      operationId: get_student_average
      parameters:
        - name: student_id
          in: path
          description: the uid
          required: true
          style: simple
          explode: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: number
                format: float
        "400":
          description: Invalid ID
        "404":
          description: Not found
      x-openapi-router-controller: swagger_server.controllers.default_controller
  /student/{student_id}/grades/{subject}:
    get:
      summary: Gets grade of student for subject
      description: Returns the grade of a given student and subject.
      operationId: get_student_grade
      parameters:
        - name: student_id
          in: path
          description: the uid
          required: true
          style: simple
          explode: false
          schema:
            type: string
            format: uuid
        - name: subject
          in: path
          description: the subject name
          required: true
          style: simple
          explode: false
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: number
                format: float
        "400":
          description: Invalid ID
        "404":
          description: Not found
      x-openapi-router-controller: swagger_server.controllers.default_controller
  /student/{student_id}:
    get:
      summary: gets student
      description: Returns a single student
      operationId: get_student_by_id
      parameters:
      - name: student_id
        in: path
        description: the uid
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: Invalid ID
        "404":
          description: Not found
      x-openapi-router-controller: swagger_server.controllers.default_controller
    delete:
      summary: Deletes a student
      description: |
        Delete a single student by ID
      operationId: delete_student
      parameters:
      - name: student_id
        in: path
        description: the uid
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                format: Student
                x-content-type: application/json
        "400":
          description: Bad Request
        "404":
          description: Student with specified student_id cannot be found
      x-openapi-router-controller: swagger_server.controllers.default_controller
  /student:
    post:
      summary: Add a new student
      description: Adds an item to the system
      operationId: add_student
      requestBody:
        description: Student item to add
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Student"
      responses:
        "200":
          description: created
          content:
            application/json:
              schema:
                type: string
                format: uuid
                x-content-type: application/json
        "400":
          description: "invalid input, object invalid"
        "409":
          description: Already exists
      x-openapi-router-controller: swagger_server.controllers.default_controller
components:
  schemas:
    Student:
      required:
      - first_name
      - last_name
      type: object
      properties:
        student_id:
          type: integer
          example: 16493087
        first_name:
          type: string
          example: Jens
        last_name:
          type: string
          example: Steenmetz
        grade_records:
          type: array
          example:
          - subject_name: DevOps and Cloud
            grade: 9
          - subject_name: Software Process
            grade: 9
          items:
            $ref: "#/components/schemas/GradeRecord"
      example:
        student_id: 16493087
        last_name: Steenmetz
        grade_records:
        - subject_name: DevOps and Cloud
          grade: 9
        - subject_name: Software Process
          grade: 9
        first_name: Jens
    GradeRecord:
      required:
      - grade
      - subject_name
      type: object
      properties:
        subject_name:
          type: string
          example: DevOps and Cloud
        grade:
          maximum: 10
          minimum: 0
          type: number
          format: float
          example: 9

